version: "3.9"

# ── LiiLend Docker Compose ─────────────────────────────────────────────────────
# Usage:
#   docker compose up -d                     # start all services
#   docker compose up -d backend frontend    # start specific services
#   docker compose logs -f                   # follow logs

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    container_name: liilend-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
      WS_URL: ${WS_URL:-wss://api.devnet.solana.com}
      PROGRAM_ID: ${PROGRAM_ID:-BrtmpQXVMryfdrtTQLxFaJtSTa78nULPuxJcQfFznpQc}
      BACKEND_PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-liilend}
      POSTGRES_USER: ${POSTGRES_USER:-liilend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    logging: *default-logging
    networks:
      - liilend-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    container_name: liilend-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_RPC_URL: ${NEXT_PUBLIC_RPC_URL:-https://api.devnet.solana.com}
      NEXT_PUBLIC_PROGRAM_ID: ${NEXT_PUBLIC_PROGRAM_ID:-BrtmpQXVMryfdrtTQLxFaJtSTa78nULPuxJcQfFznpQc}
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - liilend-net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: liilend-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly yes
      - --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - liilend-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: liilend-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liilend}
      POSTGRES_USER: ${POSTGRES_USER:-liilend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liilend} -d ${POSTGRES_DB:-liilend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - liilend-net

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  liilend-net:
    driver: bridge
